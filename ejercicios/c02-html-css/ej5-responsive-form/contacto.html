<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Contacto</h1>
    </header>
    
    <main>
        <form class="formulario">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Nombre" required minlength="3" maxlength="30">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="ej. hola@mail.com" required>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="##########" required minlength="10" maxlength="10">

            <label for="asunto">Asunto:</label>
            <input type="text" id="asunto" name="asunto" placeholder="Asunto" required maxlength="20">

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="7"></textarea>

            <button type="submit">Enviar</button>
        </form>

    </main>

    <nav class="nav">
        <a href="index.html">Inicio</a>
        <a href="estudios.html">Estudios</a>
        <a href="experiencia.html">Experiencia laboral</a>
        <a href="hobbies.html">Hobbies</a>
    </nav>

</body>

</html>
