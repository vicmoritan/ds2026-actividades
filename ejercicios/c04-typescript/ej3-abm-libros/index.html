<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de libros</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Catálogo de libros</h1>
    </header>

    <main>
        <ul id="listado"></ul>

        <input type="text" id="filtroAutor" placeholder="Autor">
        <button id="filtrar">Filtrar</button>
        <button id="mostrarDisponibles">Solo disponibles</button>
        <button id="mostrarTodos">Ver todos</button>

        <p id="stats"></p>

        <h2>Agregar nuevo libro</h2>
        <form class="formulario" id="form">
            <label for="titulo">Título:</label>
            <input type="text" id="titulo" name="titulo" placeholder="Titulo" required minlength="3" maxlength="30">

            <label for="autor">Autor:</label>
            <input type="text" id="autor" name="autor" placeholder="Autor" required>

            <label for="precio">Precio:</label>
            <input type="number" id="precio" name="precio" placeholder="Precio" required>

            <label class="checkboxCampo">
                ¿Está disponible?
            <input type="checkbox" id="disponible" name="disponible">
            </label>

            <label for="genero">Género (opcional):</label>
            <input type="text" id="genero" name="genero" placeholder="Genero" minlength="4" maxlength="30">

            <div id="errorForm"></div>

            <button type="button" id="agregar">Agregar</button>
        </form>

    </main>

    <script src="app.js"></script>
    
</body>
</html>
